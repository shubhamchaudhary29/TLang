name: Release Packaging

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  package:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: TLang
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Application
        run: ./gradlew installDist

      - name: Build Native Installer
        run: ./gradlew jpackage

      # Upload installer artifact regardless of pass/fail
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: installer-${{ matrix.os }}
          path: TLang/build/jpackage/*
          if-no-files-found: warn

      # Linux Verification Step
      - name: Install & Verify (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo dpkg -i build/jpackage/tlang_1.0_amd64.deb
          # Verify PATH resolution with clean environment
          env -i PATH=/usr/bin:/bin tlang version
          env -i PATH=/usr/bin:/bin tlang help
          # Uninstall cleanly
          sudo dpkg -r tlang
          # Verify symlink is removed
          if [ -f /usr/bin/tlang ]; then
            echo "Error: Symlink was not removed"
            exit 1
          fi

      # macOS Verification Step
      - name: Install & Verify (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          sudo installer -pkg build/jpackage/TLang-1.0.pkg -target /
          # Verify PATH resolution with clean environment
          env -i PATH=/usr/local/bin:/usr/bin:/bin tlang version
          env -i PATH=/usr/local/bin:/usr/bin:/bin tlang help

      # Windows Verification Step
      - name: Install & Verify (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Install silently and wait for completion
          Start-Process msiexec.exe -ArgumentList '/i', 'build\jpackage\TLang-1.0.msi', '/qn', '/norestart' -NoNewWindow -Wait
          
          # Verify installation folder exists
          if (!(Test-Path "C:\Program Files\TLang\TLang.exe")) {
            Write-Error "TLang.exe not found in C:\Program Files\TLang"
            exit 1
          }
          
          # Get system and user PATH from registry to simulate a fresh shell session
          $systemPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          
          Write-Host "System Registry PATH: $systemPath"
          
          if ($systemPath -like "*TLang*") {
            Write-Host "SUCCESS: TLang found in system PATH in registry."
          } else {
            Write-Error "FAILURE: TLang not found in system PATH in registry."
            exit 1
          }
          
          # Overwrite process Path with registry values to simulate fresh environment
          $env:Path = "$systemPath;$userPath"
          
          # Run tlang version and tlang help via PATH resolution
          tlang version
          tlang help
