name: Release Packaging

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  package:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: TLang
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Application
        run: ./gradlew installDist

      - name: Build Native Installer
        run: ./gradlew jpackage

      # Upload installer artifact regardless of pass/fail
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: installer-${{ matrix.os }}
          path: TLang/build/jpackage/*
          if-no-files-found: warn

      # Linux Verification Step
      - name: Install & Verify (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo dpkg -i build/jpackage/tlang_*_amd64.deb
          # Verify PATH resolution with clean environment
          env -i PATH=/usr/bin:/bin tlang version
          env -i PATH=/usr/bin:/bin tlang help
          # Uninstall cleanly
          sudo dpkg -r tlang
          # Verify symlink is removed
          if [ -f /usr/bin/tlang ]; then
            echo "Error: Symlink was not removed"
            exit 1
          fi

      # macOS Verification Step
      - name: Install & Verify (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          sudo installer -pkg build/jpackage/TLang-*.pkg -target /
          # Verify PATH resolution with clean environment
          env -i PATH=/usr/local/bin:/usr/bin:/bin tlang version
          env -i PATH=/usr/local/bin:/usr/bin:/bin tlang help

      # Windows Verification Step
      - name: Install & Verify (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Resolve the MSI path dynamically using wildcard
          $msiPath = Resolve-Path build\jpackage\TLang-*.msi | Select-Object -ExpandProperty Path
          # Install silently and wait for completion
          Start-Process msiexec.exe -ArgumentList '/i', "`"$msiPath`"", '/qn', '/norestart' -NoNewWindow -Wait
          
          # Verify installation folder exists
          if (!(Test-Path "C:\Program Files\TLang\TLang.exe")) {
            Write-Error "TLang.exe not found in C:\Program Files\TLang"
            exit 1
          }
          
          # Get system and user PATH from registry to simulate a fresh shell session
          $systemPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          
          Write-Host "System Registry PATH: $systemPath"
          
          if ($systemPath -like "*TLang*") {
            Write-Host "SUCCESS: TLang found in system PATH in registry."
          } else {
            Write-Error "FAILURE: TLang not found in system PATH in registry."
            exit 1
          }
          
          # Overwrite process Path with registry values to simulate fresh environment
          $env:Path = "$systemPath;$userPath"
          
          # Run tlang version and tlang help via PATH resolution
          tlang version
          tlang help

  release:
    name: Create GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract Clean Version
        id: get_version
        run: |
          # Remove leading 'v' from tag name
          TAG_NAME="${{ github.ref_name }}"
          CLEAN_VERSION="${TAG_NAME#v}"
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/installer-ubuntu-latest/*
            artifacts/installer-macos-latest/*
            artifacts/installer-windows-latest/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## TLang ${{ github.ref_name }}

            This release includes:
            - **TLang CLI**: The compiler and runtime interpreter.
            - **TLang LSP**: The language server protocol implementation supporting diagnostics, go-to-definition, find-references, document symbols, and formatting.
            - **TLang Formatter**: The code formatter for standardizing TLang script files.

            ### Installation Instructions

            #### Linux (.deb)
            Download `tlang_${{ steps.get_version.outputs.version }}_amd64.deb` and install it via:
            ```bash
            sudo dpkg -i tlang_${{ steps.get_version.outputs.version }}_amd64.deb
            ```

            #### macOS (.pkg)
            Download `TLang-${{ steps.get_version.outputs.version }}.pkg` and double-click to install, or run:
            ```bash
            sudo installer -pkg TLang-${{ steps.get_version.outputs.version }}.pkg -target /
            ```

            #### Windows (.msi)
            Download `TLang-${{ steps.get_version.outputs.version }}.msi` and double-click to run the installer.
